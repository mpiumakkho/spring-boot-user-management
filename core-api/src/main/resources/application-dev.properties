# application-dev.properties
env=dev
project=core-api
site=default
server.port=8091

# dev
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:P@ss4321}
spring.datasource.driver-class-name=org.postgresql.Driver

# jpa config
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=sample_app

# flyway config
spring.flyway.enabled=true
spring.flyway.schemas=sample_app
spring.flyway.baseline-on-migrate=true

# logging config
logging.level.org.hibernate.orm.connections.pooling=WARN
logging.level.org.hibernate.jpa.internal.util.LogHelper=WARN
logging.level.org.hibernate.Version=WARN
logging.level.org.hibernate.engine.transaction.jta.platform.internal.JtaPlatformInitiator=WARN

# security config
app.security.aes-key=${AES_KEY:1234567890123456}
app.security.api-key=${API_KEY:changeme-dev-api-key-2024}
app.security.rate-limit.max-requests=10
app.security.rate-limit.window-seconds=60

# actuator config
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.health.disk-space.enabled=true
management.info.env.enabled=true